# G4 — Livraison continue (image Docker + déploiement smoke Compose)
name: G4 CD

on:
  push:
    branches: [main, master]
    paths:
      - "service-coordination-transport/**"
      - ".github/workflows/g4-cd.yml"
  workflow_dispatch:

concurrency:
  group: g4-cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

defaults:
  run:
    working-directory: service-coordination-transport

jobs:
  test:
    name: CI — Maven tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test & package
        run: |
          chmod +x mvnw
          ./mvnw -B -q test
          ./mvnw -B -q -DskipTests package

  deploy-smoke:
    name: CD — Deploy smoke (Docker Compose)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres + Kafka
        run: docker compose up -d postgres kafka

      - name: Wait for infra
        run: |
          for i in $(seq 1 60); do
            if docker compose exec -T postgres pg_isready -U g4 -d sgitu_g4 2>/dev/null; then
              echo "Postgres ready"
              break
            fi
            sleep 2
          done
          for i in $(seq 1 60); do
            if docker compose exec -T kafka bash -c '</dev/tcp/127.0.0.1/9092' 2>/dev/null; then
              echo "Kafka ready"
              break
            fi
            sleep 2
          done

      - name: Build & start G4
        run: |
          docker compose build g4-coordination
          docker compose up -d g4-coordination

      - name: Health check
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8084/api/g4/health | grep -q '"status":"UP"'; then
              curl -s http://localhost:8084/api/g4/health
              exit 0
            fi
            sleep 3
          done
          echo "G4 health check failed"
          docker compose logs g4-coordination
          exit 1

      - name: Teardown
        if: always()
        run: docker compose down -v

  publish-image:
    name: CD — Publish image (GHCR)
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR lowercase)
        id: image
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${{ env.REGISTRY }}/${REPO_LC}/g4-coordination" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: service-coordination-transport
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
