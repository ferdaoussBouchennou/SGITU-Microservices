name: CI/CD - G7 Suivi Véhicule

on:
  push:
    branches: [ "main", "develop" ]
    # Déclenche uniquement si des fichiers dans le microservice G7 sont modifiés
    paths:
      - "service-suivi-vehicule/**"
      - "ci-cd-g7.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "service-suivi-vehicule/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Toutes les étapes s'exécutent dans le dossier du microservice
    defaults:
      run:
        working-directory: service-suivi-vehicule

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Configurer Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' # Met en cache les dépendances Maven pour accélérer les builds suivants

    - name: Compiler et exécuter les tests
      run: mvn clean test -Dspring.profiles.active=test

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    # Ne s'exécute pas sur les PR, uniquement sur les pushs validés
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write # Nécessaire pour publier sur GHCR

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Configurer Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Connexion au registre GitHub (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Construire et publier l'image
      uses: docker/build-push-action@v5
      with:
        context: ./service-suivi-vehicule
        file: ./service-suivi-vehicule/Dockerfile
        push: true
        # Tag l'image avec 'latest' et le hash court du commit git
        tags: |
          ghcr.io/${{ github.repository }}/g7-suivi-vehicules:latest
          ghcr.io/${{ github.repository }}/g7-suivi-vehicules:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
