# G4 — Intégration continue (tests Maven à chaque push/PR)
name: G4 CI

on:
  push:
    paths:
      - "service-coordination-transport/**"
      - ".github/workflows/g4-ci.yml"
      - ".github/workflows/g4-cd.yml"
  pull_request:
    paths:
      - "service-coordination-transport/**"
      - ".github/workflows/g4-ci.yml"
      - ".github/workflows/g4-cd.yml"

concurrency:
  group: g4-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: service-coordination-transport

jobs:
  test:
    name: Maven tests (Java 17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw -B -q test

      - name: Package (verify build)
        run: ./mvnw -B -q -DskipTests package
