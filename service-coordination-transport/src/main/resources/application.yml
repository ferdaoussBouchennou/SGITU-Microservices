spring:
  application:
    name: g4-coordination-transport
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sgitu_g4}
    username: ${SPRING_DATASOURCE_USERNAME:g4}
    password: ${SPRING_DATASOURCE_PASSWORD:g4}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    show-sql: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      group: G4

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

sgitu:
  jwt:
    secret: ${SGITU_JWT_SECRET:SGlUVS1HNC1KV1QtU0VDUkVOLURFVl8xMjhCaXRzX19VU0VfRU5WX1ZBUiMjIw==}
    expiration-ms: ${SGITU_JWT_EXPIRATION_MS:86400000}
  integration:
    g3-base-url: ${SGITU_G3_URL:http://localhost:8083}
    g3-validation-enabled: ${SGITU_G3_VALIDATION_ENABLED:true}
    g3-validation-strict: ${SGITU_G3_VALIDATION_STRICT:false}
    g3-drivers-ids-path: ${SGITU_G3_DRIVERS_IDS_PATH:/api/users/drivers/ids}
    g3-notification-recipients-enabled: ${SGITU_G3_NOTIFICATION_RECIPIENTS_ENABLED:true}
    g3-notification-recipients-strict: ${SGITU_G3_NOTIFICATION_RECIPIENTS_STRICT:false}
    g3-notification-recipients-path: ${SGITU_G3_NOTIFICATION_RECIPIENTS_PATH:/api/users/notification-recipients}
    g3-notification-recipients-page-size: ${SGITU_G3_NOTIFICATION_RECIPIENTS_PAGE_SIZE:100}
    g3-notification-recipient-roles: ${SGITU_G3_NOTIFICATION_RECIPIENT_ROLES:}
    g3-service-bearer-token: ${SGITU_G3_SERVICE_BEARER_TOKEN:}
    # Billetterie = G1. Les variables SGITU_G3_* mission restent acceptées (rétrocompat).
    g1-base-url: ${SGITU_G1_URL:http://localhost:8081}
    g5-base-url: ${SGITU_G5_URL:http://localhost:8085}
    g7-base-url: ${SGITU_G7_URL:http://localhost:8087}
    g7-flow-enabled: ${SGITU_G7_FLOW_ENABLED:true}
    g7-flow-strict: ${SGITU_G7_FLOW_STRICT:false}
    g7-sync-on-demand-enabled: ${SGITU_G7_SYNC_ON_DEMAND:true}
    g7-vehicules-path: ${SGITU_G7_VEHICULES_PATH:/api/suivi-vehicules/vehicules}
    g9-base-url: ${SGITU_G9_URL:http://localhost:8089}
    g10-gateway-url: ${SGITU_G10_URL:http://localhost:8080}
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
    g5-notification-path: /api/notifications/send
    g1-mission-lifecycle-path: ${SGITU_G1_MISSION_LIFECYCLE_PATH:${SGITU_INTEGRATION_G3_MISSION_LIFECYCLE_PATH:/api/internal/missions/events}}
  kafka:
    enabled: ${SGITU_KAFKA_ENABLED:true}
    topic-coordination: ${SGITU_KAFKA_TOPIC:sgitu.g4.coordination.events}
    topic-incident-inbound: ${SGITU_G9_INCIDENT_TOPIC:incident.transport.topic}
    g9-consumer-group-id: ${SGITU_G9_CONSUMER_GROUP:g4-coordination-g9}
    topic-mission-lifecycle: ${SGITU_G1_MISSION_TOPIC:${SGITU_G3_MISSION_TOPIC:missions-lifecycle}}
    topic-vehicule-positions: ${SGITU_G7_POSITIONS_TOPIC:vehicule-positions}
    topic-vehicle-registered: ${SGITU_G7_VEHICLE_REGISTERED_TOPIC:vehicle.registered}
    g7-consumer-group-id: ${SGITU_G7_CONSUMER_GROUP:g4-coordination-g7}
    g7-registered-consumer-group-id: ${SGITU_G7_REGISTERED_CONSUMER_GROUP:g4-coordination-g7-registered}
  g5-notification:
    # Événement coordination → POST G5 via G10, un payload par utilisateur (recipient depuis G3)
    post-on-event-enabled: ${SGITU_G5_POST_ON_EVENT_ENABLED:true}
    source-service: ${SGITU_G5_SOURCE_SERVICE:COORDINATION}
    channel: EMAIL
  detection:
    enabled: ${SGITU_DETECTION_ENABLED:true}
    deviation-max-meters: ${SGITU_DETECTION_DEVIATION_MAX_METERS:150}
    delay-tolerance-minutes: ${SGITU_DETECTION_DELAY_TOLERANCE_MINUTES:5}
    near-stop-max-meters: ${SGITU_DETECTION_NEAR_STOP_MAX_METERS:80}
    cooldown-minutes: ${SGITU_DETECTION_COOLDOWN_MINUTES:10}

resilience4j:
  circuitbreaker:
    instances:
      g5Notification:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 2
        failureRateThreshold: 50
        waitDurationInOpenState: 5s

app:
  supervision:
    log-buffer-size: 500
  resilience:
    pending-notification-retry-ms: 30000

logging:
  level:
    root: INFO
    com.sgitu.g4: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [%thread] %-5level group=G4 service=g4-coordination %logger{36} - %msg%n"

info:
  app:
    version: 0.0.1-SNAPSHOT
    component: G4-Coordination-Transport

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/sgitu_g4
    username: g4
    password: g4
