spring:
  datasource:
    url: jdbc:h2:mem:g4test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

sgitu:
  jwt:
    secret: VGVzdFNlY3JldEtleUZvckc0VW5pdFRlc3RzX18xMjhCaXRzIQ==
    expiration-ms: 3600000
  integration:
    g7-flow-enabled: false
    g3-validation-enabled: false
    g3-notification-recipients-enabled: false
  kafka:
    enabled: false
  g5-notification:
    post-on-event-enabled: false

logging:
  level:
    org.springframework.security: WARN
