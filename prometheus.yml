global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ---------------------------------------------------------------
  #  G1 — (ajoutez votre bloc ici)
  # ---------------------------------------------------------------

  # ---------------------------------------------------------------
  #  G2 — Service Abonnement (SGITU)
  # ---------------------------------------------------------------
  - job_name: 'service-abonnement'
    static_configs:
      - targets: ['service-abonnement:8082']
    metrics_path: '/actuator/prometheus'

  # ---------------------------------------------------------------
  #  G3 — Service Utilisateur (SGITU)
  # ---------------------------------------------------------------
  - job_name: 'g3-user-service'
    static_configs:
      - targets: ['g3-user-service:8083']
    metrics_path: '/api/actuator/prometheus'

  # ---------------------------------------------------------------
  #  G4 — Coordination des transports (Groupe G4)
  # ---------------------------------------------------------------
  - job_name: 'g4-coordination'
    static_configs:
      - targets: ['g4-coordination:8084']
    metrics_path: '/actuator/prometheus'

  # ---------------------------------------------------------------
  #  G5 — Service de Notifications (SGITU)
  # ---------------------------------------------------------------
  - job_name: 'g5-notification'
    static_configs:
      - targets: ['notification-service:8085']
    metrics_path: '/actuator/prometheus'
  # ---------------------------------------------------------------
  #  G6 — Service Paiement (SGITU)
  # ---------------------------------------------------------------
  - job_name: 'payment-service'
    static_configs:
      - targets: ['g6-payment-service:8086']
    metrics_path: '/actuator/prometheus'
    scheme: 'https'
    tls_config:
      insecure_skip_verify: true
  # ---------------------------------------------------------------
  #  G7 — Service Suivi des Véhicules (SGITU)
  # ---------------------------------------------------------------
  - job_name: 'service-suivi-vehicule'
    static_configs:
      - targets: ['g7-service:8087']
    metrics_path: '/actuator/prometheus'

  # ---------------------------------------------------------------
  #  G8 — (ajoutez votre bloc ici)
  # ---------------------------------------------------------------
  - job_name: 'g8-analytics'
    static_configs:
      - targets: ['g8-analytics-service:8088']
    metrics_path: '/actuator/prometheus'

  # ---------------------------------------------------------------
  #  G9 — (ajoutez votre bloc ici)
  # ---------------------------------------------------------------

  # ---------------------------------------------------------------
  #  G10 — (ajoutez votre bloc ici)
  # ---------------------------------------------------------------
