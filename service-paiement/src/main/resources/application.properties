# ================================================================
# G6 Payment Service — Configuration
# ================================================================

spring.application.name=payment-service
server.port=8086

# ================================================================
# TLS / HTTPS
# ================================================================
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=sgitu2026
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=payment-service

# ================================================================
# Base de données MySQL
# ================================================================
spring.datasource.url=jdbc:mysql://localhost:3316/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ================================================================
# JWT Security
# ================================================================
jwt.secret=SGITU_G6_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS!!
jwt.expiration=86400000

# ================================================================
# Kafka — G5 Notifications
# ================================================================
spring.kafka.bootstrap-servers=localhost:29093
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
kafka.topic.payment-notifications=payment.notification

# ================================================================
# Services internes (callbacks G2 + G1)
# ================================================================
subscription.service.url=http://localhost:8082
ticket.service.url=http://localhost:8081

# ================================================================
# Swagger / OpenAPI
# ================================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ================================================================
# Logging
# ================================================================
logging.level.ma.sgitu.payment=DEBUG
logging.level.org.springframework.kafka=INFO