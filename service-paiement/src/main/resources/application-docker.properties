# ================================================================
# G6 Payment Service — Docker Profile
# ================================================================

# Base de données (Docker network)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://payment-db:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sgitu}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sgitupassword}

# Kafka (Docker network)
spring.kafka.bootstrap-servers=kafka:9092

# Services internes (Docker network)
subscription.service.url=http://abonnement-service:8082
ticket.service.url=http://billetterie-service:8081
notification.service.url=http://notification-service:8085

# JWT
jwt.secret=${JWT_SECRET:SGITU_G6_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS!!}

# Logging
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
logging.level.ma.sgitu.payment=INFO