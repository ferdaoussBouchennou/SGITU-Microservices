# Configuration de la base de données de test en mémoire (H2)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Désactiver l'initialisation automatique et la connexion Kafka pour éviter les erreurs/timeouts
spring.kafka.listener.auto-startup=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.consumer.bootstrap-servers=localhost:9092

# Autres configurations de test
logging.level.org.springframework=INFO
logging.level.com.g7suivivehicules=DEBUG
