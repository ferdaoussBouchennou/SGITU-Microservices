# APPLICATION
spring.application.name=g7-suivi-vehicules
server.port=8087

# DATABASE
spring.datasource.url=jdbc:postgresql://localhost:5432/g7_vehicules
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# KAFKA
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=g7-group
spring.kafka.consumer.auto-offset-reset=earliest
# Fail fast si Kafka est absent (evite le blocage de 60s)
spring.kafka.producer.properties.max.block.ms=500
spring.kafka.producer.properties.delivery.timeout.ms=1000
spring.kafka.producer.properties.request.timeout.ms=500

kafka.topic.anomalie=anomalies-terrain
kafka.topic.position=vehicule-positions
kafka.topic.incident=suivi-vehicule.incident.topic
kafka.topic.telemetrie=g7.telemetrie.stream
kafka.topic.g8=g8.vehicule.status
kafka.topic.vehicle.registered=vehicle.registered
# JWT - Secret partagé avec tous les groupes (défini par G3)
jwt.secret=${JWT_SECRET:SGITU_G3_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS}
jwt.expiration=86400000

# SWAGGER
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ACTUATOR
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# SEUILS ANOMALIES
anomalie.seuil.vitesse.max=80.0
anomalie.seuil.temperature.critique=100.0
anomalie.seuil.carburant.critique=5.0
anomalie.seuil.immobilisation.minutes=5
anomalie.seuil.freinage.deceleration=-4.0
anomalie.immobilisation.rayon.metres=50.0
anomalie.immobilisation.nb.positions=10

# G9 INTEGRATION
g9.integration.url=http://localhost:8089/api/v1/incidents

# G5 INTEGRATION
g5.notification.url=http://notification-service:8085/api/notifications/send

# CACHE (Caffeine)
# TTL 5 minutes : les seuils sont rechargés depuis la DB toutes les 5 min max
# La modification via API invalide le cache immédiatement (@CacheEvict)
# autres
spring.cache.type=caffeine
spring.cache.cache-names=seuils
spring.cache.caffeine.spec=maximumSize=50,expireAfterWrite=5m

# RESILIENCE4J
# Circuit Breaker
resilience4j.circuitbreaker.instances.g5NotificationService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.g5NotificationService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.g5NotificationService.sliding-window-size=10
resilience4j.circuitbreaker.instances.g5NotificationService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.g5NotificationService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.g5NotificationService.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.kafkaProducer.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafkaProducer.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.kafkaProducer.sliding-window-size=5
resilience4j.circuitbreaker.instances.kafkaProducer.minimum-number-of-calls=3

# Retry
resilience4j.retry.instances.g5NotificationService.max-attempts=3
resilience4j.retry.instances.g5NotificationService.wait-duration=1s
resilience4j.retry.instances.g5NotificationService.retry-exceptions=org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException

resilience4j.retry.instances.kafkaProducer.max-attempts=2
resilience4j.retry.instances.kafkaProducer.wait-duration=500ms

# Rate Limiter
resilience4j.ratelimiter.instances.apiEndpoints.limit-for-period=100
resilience4j.ratelimiter.instances.apiEndpoints.limit-refresh-period=1s
resilience4j.ratelimiter.instances.apiEndpoints.timeout-duration=0

# Time Limiter
resilience4j.timelimiter.instances.g5NotificationService.timeout-duration=3s
resilience4j.timelimiter.instances.kafkaProducer.timeout-duration=2s

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false