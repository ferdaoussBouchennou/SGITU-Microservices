api:
  info:
    title: Paperless Ticket Service
    description: Microservice responsible for managing paperless tickets
    version: v1
    termsOfService: https://example.com/terms

  contact:
    name: NYIRENDA AMOS, CHOUHE JIHANE, ESSEBAIY AYA, ELMESSAOUDI FATIMA
    email: paperless-ticket-team@gmail.com
    url: https://github.com/amosnyirenda123/SGITU-Microservices.git

  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

service:
  name: paperless-ticket-service
  environment: dev

# Configuration de Resilience4j (Circuit Breakers, Retries, Rate Limiters)
resilience4j:
  circuitbreaker:
    instances:
      paymentService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2000ms
      coordinationService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50

  retry:
    instances:
      paymentService:
        maxAttempts: 3
        waitDuration: 1000ms
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException
      coordinationService:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException

  ratelimiter:
    instances:
      paymentService:
        limitForPeriod: 5
        limitRefreshPeriod: 1s
        timeoutDuration: 500ms
      coordinationService:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 500ms

# Exposition d'Actuator pour monitorer la résilience
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, loggers, env
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true