# ═══════════════════════════════════════════════════════════
#  SGITU — Service Utilisateur (G3) — Port 8083
# ═══════════════════════════════════════════════════════════

spring.application.name=user-service

# ── Serveur ──
server.port=8083
server.servlet.context-path=/api

# ── Base de données PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5432/users_db
spring.datasource.username=postgres
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT (clé secrète partagée avec G10 — min 256 bits) ──
jwt.secret=SGITU_G3_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS!!
jwt.expiration=900
jwt.refresh-expiration=604800

# ── Redis (tokens révoqués) ──
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}

# ── Clé interne (partagée avec G10 pour /users/internal/**) ──
internal.key=SGITU_INTERNAL_SECRET_KEY_CHANGE_ME

# ?? Swagger / OpenAPI ??
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ?? Outgoing events ? G8: Analyse & donn�es ??
# G8 ingestion endpoint: /api/v1/ingestion/users
# G8_BASE_URL must be set to G8's container name + port (e.g. http://g8-service:8080)
# Leave blank to disable silently (safe default for local dev without G8 running).
events.user-status.url=http://localhost/api/v1/ingestion/users

# ?? Kafka Configuration ??
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

