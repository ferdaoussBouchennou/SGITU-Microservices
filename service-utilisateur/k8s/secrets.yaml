apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
  namespace: sgitu
type: Opaque
stringData:
  # Database Password
  SPRING_DATASOURCE_PASSWORD: "secret"
  POSTGRES_PASSWORD: "secret"
  
  # JWT Secret (256 bits minimum)
  JWT_SECRET: "SGITU_G3_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS!!"
  
  # Internal API Key (shared with G10)
  INTERNAL_KEY: "SGITU_INTERNAL_SECRET_KEY_CHANGE_ME"
---
# Note: In production, use Sealed Secrets or external secret management
# Example with Sealed Secrets:
# kubectl create secret generic user-service-secrets \
#   --from-literal=JWT_SECRET='your-secret' \
#   --dry-run=client -o yaml | \
#   kubeseal -o yaml > sealed-secrets.yaml
