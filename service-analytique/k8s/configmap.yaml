apiVersion: v1
kind: ConfigMap
metadata:
  name: service-analytique-config
  namespace: service-analytique
  labels:
    app: service-analytique
    component: backend
data:
  # Configuration de la base de données
  MONGO_URI: "mongodb://admin:password123@mongodb-service:27017/g8_analytics?authSource=admin"
  MONGO_DATABASE: "g8_analytics"
  
  # Configuration des services externes
  G5_NOTIFICATION_URL: "http://api-gateway:8080/api/notifications/send"
  ML_SERVICE_URL: "http://ml-service:5000"
  
  # Configuration du logging
  LOG_LEVEL: "INFO"
  LOG_PATTERN: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  
  # Configuration Spring Boot
  SPRING_PROFILES_ACTIVE: "kubernetes"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
  
  # Configuration de l'application
  SERVER_PORT: "8088"
  SERVER_SERVLET_CONTEXT_PATH: "/"
  
  # Configuration OpenAPI/Swagger
  SPRINGDOC_API_DOCS_PATH: "/api-docs"
  SPRINGDOC_SWAGGER_UI_PATH: "/swagger-ui.html"
  
  # Configuration JVM
  JAVA_OPTS: "-Xmx512m -Xms256m -XX:+UseG1GC -XX:+UseContainerSupport"
  
  # Configuration du monitoring
  MICROMETER_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
  
  # Variables spécifiques à l'analyse
  ANALYSIS_TIMEOUT_MINUTES: "30"
  MAX_CONCURRENT_ANALYSES: "10"
  ANALYSIS_CLEANUP_HOURS: "24"
