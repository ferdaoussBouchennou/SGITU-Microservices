# Ingress optionnel pour l'accès externe (si vous avez un Ingress Controller)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: service-analytique-ingress
  namespace: service-analytique
  labels:
    app: service-analytique
    component: ingress
  annotations:
    # Annotations pour NGINX Ingress Controller
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    
    # Annotations pour le monitoring
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Service-Name: service-analytique";
      more_set_headers "X-Environment: kubernetes";
    
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    
spec:
  ingressClassName: nginx
  rules:
  - host: service-analytique.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: service-analytique
            port:
              number: 8088
  - host: api.sgitu.ma
    http:
      paths:
      - path: /analytics
        pathType: Prefix
        backend:
          service:
            name: service-analytique
            port:
              number: 8088
