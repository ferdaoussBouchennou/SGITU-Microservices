services:

  mongodb:
    image: mongo:7.0
    container_name: g8-mongo
    ports:
      - "27017:27017"
    volumes:
      - g8-mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: g8_analytics
    networks:
      - sgitu-internal
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  ml-service:
    build: ./ml-service
    container_name: g8-ml-service
    networks:
      - sgitu-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  g8-analytics:
    build: .
    container_name: g8-analytics-service
    ports:
      - "8088:8088"
    environment:
      MONGO_URI: mongodb://mongodb:27017/g8_analytics
      ML_SERVICE_URL: http://ml-service:5000
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - sgitu-internal
    depends_on:
      mongodb:
        condition: service_healthy
      ml-service:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: on-failure

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: g8-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - sgitu-internal
    depends_on:
      g8-analytics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  grafana:
    image: grafana/grafana:10.4.0
    container_name: g8-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sgitu2026
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - sgitu-internal
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: g8-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - sgitu-internal

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: g8-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - sgitu-internal
    depends_on:
      - zookeeper

networks:
  sgitu-internal:
    name: sgitu-internal
    driver: bridge

volumes:
  g8-mongo-data:
