apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-notification
  labels:
    app: mysql-notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-notification
  template:
    metadata:
      labels:
        app: mysql-notification
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: "notifications_db"
            - name: MYSQL_USER
              value: "sgitu"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: MYSQL_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-notification
  labels:
    app: mysql-notification
spec:
  type: ClusterIP
  selector:
    app: mysql-notification
  ports:
    - port: 3306
      targetPort: 3306
