# ================================================================
#  SGITU — Global Docker Compose
#  Regroupe tous les microservices du projet SGITU (G1 à G10).
#
#  POUR AJOUTER VOTRE SERVICE :
#  1. Préfixez container_name avec votre groupe (ex: g5-service).
#  2. Choisissez un port hôte libre et mettez à jour le tableau.
#  3. Connectez au réseau "sgitu-network".
#  4. Ajoutez vos volumes en bas du fichier.
#
#  PORTS UTILISÉS :
#  G2  → 8082 (abonnement-service), 3307 (db-abonnement), 8080 (phpmyadmin)
#  G3  → 8083 (user-service), 5433 (users-db)
#  G4  → 8084 (g4-coordination), 5434 (g4-postgres)
#  G5  → 8085 (à définir par le groupe G5 — notification-service)
#  G7  → 8087 (g7-service), 5437 (db-g7)
#  Transverse → 9090 (prometheus), 3000 (grafana), 9093/29093 (kafka)
#
#  DÉMARRAGE :
#    cp .env.example .env     # première fois — remplir g4_DB_*, JWT_SECRET, etc.
#    docker compose up -d
#  Monitoring : prometheus.yml (racine) — http://localhost:9090/targets | Grafana :3000 
# ================================================================

services:

  # ---------------------------------------------------------------
  #  G1 — (ajoutez votre service ici)
  # ---------------------------------------------------------------
  service-billetterie:
    build:
      context: ./service-billetterie
      dockerfile: Dockerfile
    container_name: service-billetterie
    hostname: service-billetterie
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      MONGO_URI: mongodb://${billetterie_MONGO_ROOT_USERNAME}:${billetterie_MONGO_ROOT_PASSWORD}@billetterie-mongo:27017/${billetterie_MONGO_DATABASE}?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYMENT_SERVICE_URL: ${G6_BASE_URL:-http://service-paiement:8086}
      COORDINATION_SERVICE_URL: ${G4_BASE_URL:-http://g4-coordination:8084}
    depends_on:
      billetterie-mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - sgitu-network
      - billetterie-db-network

  billetterie-mongo:
    image: mongo:7
    container_name: billetterie-mongo
    hostname: billetterie-mongo
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${billetterie_MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${billetterie_MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${billetterie_MONGO_DATABASE}
    volumes:
      - billetterie_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - billetterie-db-network

  # ---------------------------------------------------------------
  #  G2 — Service Abonnement (port 8082)
  # ---------------------------------------------------------------
  abonnement-service:
    # On utilise l'image construite et publiée par le pipeline CD (GitHub Actions)
    # Pour mettre à jour l'image : pousser sur main → GitHub Actions → Docker Hub
    image: raihana10m/service-abonnement:latest

    container_name: service-abonnement
    ports:
      - "8082:8082"
    depends_on:
      db-abonnement:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_NAME=${abonnement_DB_NAME}
      - DB_USER=${abonnement_DB_USER}
      - DB_PASSWORD=${abonnement_DB_PASSWORD}
      - UTILISATEUR_SERVICE_URL=${G3_BASE_URL}
      - PAIEMENT_SERVICE_URL=${G6_BASE_URL}
      - ANALYSE_SERVICE_URL=${G8_BASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - sgitu-network
      - abonnement-db-network
  db-abonnement:
    image: mysql:8.0
    container_name: db-abonnement
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=${abonnement_DB_NAME}
      - MYSQL_USER=${abonnement_DB_USER}
      - MYSQL_PASSWORD=${abonnement_DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${abonnement_DB_ROOT_PASSWORD}
    volumes:
      - abonnement_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 5s
      retries: 10
    networks:
      - abonnement-db-network
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - "8889:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=
      - PMA_PORT=3306
    depends_on:
      - db-abonnement
    networks:
      - abonnement-db-network
      - sgitu-network
  #  G3 — Service Utilisateur (port 8083)
  # ---------------------------------------------------------------
  user-service:
    build:
      context: ./service-utilisateur
      dockerfile: Dockerfile
    image: g3-user-service:1.0
    container_name: g3-user-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://g3-users-db:5432/${users_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${users_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${users_DB_PASSWORD}
      SPRING_REDIS_HOST: g3-redis
      SPRING_REDIS_PORT: 6379
      SERVER_PORT: 8083
      JWT_SECRET: ${JWT_SECRET:-SGITU_G3_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS!!}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      G8_BASE_URL: ${G8_BASE_URL:-}

    depends_on:
      g3-users-db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sgitu-network
      - users-db-network
  g3-users-db:
    image: postgres:15-alpine
    container_name: g3-users-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${users_DB_NAME}
      POSTGRES_USER: ${users_DB_USER}
      POSTGRES_PASSWORD: ${users_DB_PASSWORD}
    volumes:
      - g3_users_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${users_DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - users-db-network

  redis:
    image: redis:7-alpine
    container_name: g3-redis
    ports:
      - "6379:6379"
    networks:
      - sgitu-network

  # ---------------------------------------------------------------
  #  G4 — Service Coordination Transport (port 8084)
  #  Ne modifier que ce bloc + g4-postgres + volume g4_pg_data.
  #  Hostnames = services déjà définis par les autres groupes sur sgitu-network.
  # ---------------------------------------------------------------
  g4-coordination:
    build:
      context: ./service-coordination-transport
      dockerfile: Dockerfile
    container_name: g4-coordination-service
    hostname: g4-coordination
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8084"
      SPRING_DATASOURCE_URL: jdbc:postgresql://g4-postgres:5432/${g4_DB_NAME:-sgitu_g4}
      SPRING_DATASOURCE_USERNAME: ${g4_DB_USER:-g4}
      SPRING_DATASOURCE_PASSWORD: ${g4_DB_PASSWORD:-g4}
      JPA_DDL_AUTO: update
      SGITU_KAFKA_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SGITU_KAFKA_TOPIC: ${SGITU_KAFKA_TOPIC:-sgitu.g4.coordination.events}
      SGITU_G9_INCIDENT_TOPIC: ${SGITU_G9_INCIDENT_TOPIC:-incident.transport.topic}
      SGITU_G1_MISSION_TOPIC: ${SGITU_G1_MISSION_TOPIC:-missions-lifecycle}
      SGITU_G7_POSITIONS_TOPIC: ${SGITU_G7_POSITIONS_TOPIC:-vehicule-positions}
      SGITU_G7_VEHICLE_REGISTERED_TOPIC: ${SGITU_G7_VEHICLE_REGISTERED_TOPIC:-vehicle.registered}
      SGITU_G9_CONSUMER_GROUP: ${SGITU_G9_CONSUMER_GROUP:-g4-coordination-g9}
      SGITU_G7_CONSUMER_GROUP: ${SGITU_G7_CONSUMER_GROUP:-g4-coordination-g7}
      SGITU_G7_REGISTERED_CONSUMER_GROUP: ${SGITU_G7_REGISTERED_CONSUMER_GROUP:-g4-coordination-g7-registered}
      SGITU_G7_FLOW_ENABLED: ${SGITU_G7_FLOW_ENABLED:-true}
      SGITU_G7_FLOW_STRICT: ${SGITU_G7_FLOW_STRICT:-false}
      SGITU_G7_SYNC_ON_DEMAND: ${SGITU_G7_SYNC_ON_DEMAND:-true}
      SGITU_JWT_SECRET: ${JWT_SECRET:-SGlUVS1HNC1KV1QtU0VDUkVOLURFVl8xMjhCaXRzX19VU0VfRU5WX1ZBUiMjIw==}
      SGITU_G3_URL: http://g3-user-service:8083
      SGITU_G5_URL: http://notification-service:8085
      SGITU_G10_URL: ${G10_BASE_URL:-http://api-gateway:8080}
      SGITU_G7_URL: http://g7-service:8087
      SGITU_G1_URL: ${G1_BASE_URL:-http://g1-billetterie:8081}
      SGITU_G9_URL: ${G9_BASE_URL:-http://g9-incidents:8089}
      SGITU_G3_VALIDATION_ENABLED: ${SGITU_G3_VALIDATION_ENABLED:-true}
      SGITU_INTEGRATION_G5_NOTIFICATION_PATH: ${SGITU_INTEGRATION_G5_NOTIFICATION_PATH:-/api/notifications/send}
      SGITU_G1_MISSION_LIFECYCLE_PATH: ${SGITU_G1_MISSION_LIFECYCLE_PATH:-/api/internal/missions/events}
    depends_on:
      g4-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - sgitu-network
      - g4-db-network

  g4-postgres:
    image: postgres:16-alpine
    container_name: g4-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${g4_DB_NAME:-sgitu_g4}
      POSTGRES_USER: ${g4_DB_USER:-g4}
      POSTGRES_PASSWORD: ${g4_DB_PASSWORD:-g4}
    volumes:
      - g4_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${g4_DB_USER:-g4} -d ${g4_DB_NAME:-sgitu_g4}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - g4-db-network

  # ---------------------------------------------------------------
  #  G5 — (ajoutez votre service ici)
  # ---------------------------------------------------------------
  notification-service:
    build:
      context: ./service-notification
      dockerfile: Dockerfile
    container_name: notification-service
    hostname: notification-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-notification:3306/notifications_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: sgitu
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_GROUP_ID: notification-group
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT}
      SPRING_MAIL_PROTOCOL: smtp
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_FROM: ${MAIL_FROM}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_PHONE: ${TWILIO_FROM_PHONE}
      JWT_SECRET: ${JWT_SECRET}
      FIREBASE_CREDENTIALS_PATH: /app/firebase-adminsdk.json
      SPRING_PROFILES_ACTIVE: docker
    volumes:
      - ./service-notification/firebase-adminsdk.json:/app/firebase-adminsdk.json:ro
    depends_on:
      mysql-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - sgitu-network

  mysql-notification:
    image: mysql:8.0
    container_name: sgitu-mysql-notification
    hostname: mysql-notification
    ports:
      - "3314:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: notifications_db
      MYSQL_USER: sgitu
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_notification_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - sgitu-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sgitu-kafka-ui
    ports:
      - "8091:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "sgitu-local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - sgitu-network

  # ---------------------------------------------------------------
  #  G6 — Service Paiement (port 8086)
  # ---------------------------------------------------------------
  payment-service:
    build:
      context: ./service-paiement
      dockerfile: Dockerfile
    image: sgitu/payment-service:1.0.0
    container_name: g6-payment-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://g6-payment-db:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: sgitu
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-sgitupassword}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_SQL_INIT_MODE: always
      JWT_SECRET: ${JWT_SECRET:-SGITU_G6_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS!!}
      JWT_EXPIRATION: 86400000
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8086
      SPRING_KAFKA_BOOTSTRAP_SERVERS: sgitu-kafka:9092
      SUBSCRIPTION_SERVICE_URL: ${G2_BASE_URL:-http://service-abonnement:8082}
      TICKET_SERVICE_URL: ${G1_BASE_URL:-http://g1-user-service:8081}
      NOTIFICATION_SERVICE_URL: ${G5_BASE_URL:-http://g5-notification-service:8085}
    depends_on:
      g6-payment-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - sgitu-network
      - payment-db-network

  g6-payment-db:
    image: mysql:8.0
    container_name: g6-payment-db
    ports:
      - "3316:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: payment_db
      MYSQL_USER: sgitu
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sgitupassword}
    volumes:
      - payment_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - payment-db-network

  # ---------------------------------------------------------------
  #  G7 — Service Suivi des Véhicules (port 8087)
  # ---------------------------------------------------------------
  g7-service:
    build:
      context: ./service-suivi-vehicule
      dockerfile: Dockerfile
    image: service-suivi-vehicule:1.0.0
    container_name: g7-service
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-g7:5432/${suivi_vehicule_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${suivi_vehicule_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${suivi_vehicule_DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8087
      G4_BASE_URL: ${G4_BASE_URL:-}
      G5_BASE_URL: ${G5_BASE_URL:-}
      G8_BASE_URL: ${G8_BASE_URL:-}
    depends_on:
      db-g7:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - sgitu-network
      - g7-db-network

  db-g7:
    image: postgres:15-alpine
    container_name: db-g7
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: ${suivi_vehicule_DB_NAME}
      POSTGRES_USER: ${suivi_vehicule_DB_USER}
      POSTGRES_PASSWORD: ${suivi_vehicule_DB_PASSWORD}
    volumes:
      - g7_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${suivi_vehicule_DB_USER} -d ${suivi_vehicule_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - g7-db-network

  # ---------------------------------------------------------------
  #  G8 — (ajoutez votre service ici)
  # ---------------------------------------------------------------
  g8-mongo:
    image: mongo:7.0
    container_name: g8-mongo
    volumes:
      - g8_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: g8_analytics
    networks:
      - g8-private-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  g8-ml-service:
    build:
      context: ./service-analytique/ml-service
      dockerfile: Dockerfile
    container_name: g8-ml-service
    networks:
      - g8-private-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  g8-analytics-service:
    build:
      context: ./service-analytique
      dockerfile: Dockerfile
    container_name: g8-analytics-service
    ports:
      - "8088:8088"
    environment:
      MONGO_URI: mongodb://g8-mongo:27017/g8_analytics
      ML_SERVICE_URL: http://g8-ml-service:5000
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      G5_NOTIFICATION_URL: http://notification-service:8085/api/notifications/send
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      g8-mongo:
        condition: service_healthy
      g8-ml-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - sgitu-network
      - g8-private-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: on-failure

  # ---------------------------------------------------------------
  #  G9 — (ajoutez votre service ici)
  # ---------------------------------------------------------------
  g9-service:
    build:
      context: ./service-gestion-incidents
      dockerfile: Dockerfile
    container_name: service-gestion-incidents
    ports:
      - "8089:8089"
    depends_on:
      db-g9:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:mysql://db-g9:3306/sgitu_incidents?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      - DB_USERNAME=root
      - DB_PASSWORD=
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JWT_SECRET=${JWT_SECRET:-SGITU_G3_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS!!}
    networks:
      - sgitu-network
      - g9-db-network

  db-g9:
    image: mysql:8.0
    container_name: db-g9
    ports:
      - "3309:3306"
    environment:
      MYSQL_DATABASE: sgitu_incidents
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - g9_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    networks:
      - g9-db-network

  # ---------------------------------------------------------------
  #  G10 — (ajoutez votre service ici)
  # ---------------------------------------------------------------

  # ---------------------------------------------------------------
  # Observabilité transverse (alignement repo promo — prometheus.yml racine)
  # Dashboard Grafana G4 : voir service-coordination-transport/monitoring/ (profil local)
  # ---------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - sgitu-network
    depends_on:
      - g4-coordination
      - g7-service
      - user-service
      - g8-analytics-service
      - g9-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - sgitu-network
    depends_on:
      - prometheus

  # ---------------------------------------------------------------
  # Services transversaux (Kafka)
  # ---------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.8.7
    container_name: sgitu-kafka # ← préfixé pour éviter conflit
    hostname: kafka
    networks:
      - sgitu-network
    ports:
      - "9093:9092"
      - "29093:29092"
    environment:
      CLUSTER_ID: "sgitu-kafka-cluster-001"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
