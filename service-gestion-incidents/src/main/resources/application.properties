spring.application.name=service-gestion-incidents

# SERVER
server.port=8089
server.servlet.context-path=/api/incidents

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/sgitu_incidents?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# FILE UPLOAD
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# SWAGGER
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# JWT
jwt.secret=${JWT_SECRET:SGITU_G3_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS!!}

# KAFKA
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# FEIGN CLIENTS
microservices.utilisateur.url=http://localhost:8083
spring.cloud.openfeign.client.config.utilisateur-service.connect-timeout=2000
spring.cloud.openfeign.client.config.utilisateur-service.read-timeout=3000

# RESILIENCE4J  service-utilisateur (G3)
resilience4j.circuitbreaker.instances.utilisateurService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.utilisateurService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.utilisateurService.sliding-window-size=10
resilience4j.circuitbreaker.instances.utilisateurService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.utilisateurService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.utilisateurService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.utilisateurService.register-health-indicator=true

resilience4j.retry.instances.utilisateurService.max-attempts=2
resilience4j.retry.instances.utilisateurService.wait-duration=500ms
resilience4j.retry.instances.utilisateurService.retry-exceptions=feign.RetryableException,java.net.ConnectException,java.net.SocketTimeoutException,java.io.IOException

resilience4j.timelimiter.instances.utilisateurService.timeout-duration=3s

# Fallback contacts when G3 is unavailable
resilience.fallback.email=fallback@sgitu.ma
resilience.fallback.phone=+212000000000

# DUPLICATE DETECTION
incident.duplicate.radius-meters=500

# ACTUATOR / PROMETHEUS
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=service-gestion-incidents
