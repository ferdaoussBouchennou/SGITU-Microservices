spring.datasource.url=jdbc:h2:mem:sgitu_incidents_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.kafka.bootstrap-servers=localhost:9092

resilience.fallback.email=test-fallback@sgitu.ma
resilience.fallback.phone=+212111111111

microservices.utilisateur.url=http://localhost:8083

resilience4j.circuitbreaker.instances.utilisateurService.minimum-number-of-calls=1
resilience4j.circuitbreaker.instances.utilisateurService.sliding-window-size=2
resilience4j.circuitbreaker.instances.utilisateurService.wait-duration-in-open-state=1s
resilience4j.retry.instances.utilisateurService.max-attempts=1
resilience4j.timelimiter.instances.utilisateurService.timeout-duration=5s

spring.cloud.openfeign.client.config.utilisateur-service.connect-timeout=1000
spring.cloud.openfeign.client.config.utilisateur-service.read-timeout=1000
